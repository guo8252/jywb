<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易微博</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
            background-color: #f0f2f5;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            padding: 16px 0;
            box-shadow: 0 2px 8px rgba(13, 71, 161, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .post-box {
            background: white;
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-top: 3px solid #1a73e8;
        }

        .post-box textarea {
            width: 100%;
            min-height: 90px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .post-box textarea:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .char-count {
            font-size: 13px;
            color: #888;
        }

        .char-count.warning {
            color: #e53935;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #90caf9;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .feed {
            margin-top: 20px;
            padding-bottom: 40px;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .feed-title {
            font-size: 16px;
            font-weight: 600;
            color: #0d47a1;
        }

        .feed-count {
            font-size: 13px;
            color: #666;
            background: white;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .post-item {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        .post-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 71, 161, 0.12);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #42a5f5 0%, #1a73e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 600;
            color: #1a73e8;
            font-size: 15px;
        }

        .post-time {
            font-size: 12px;
            color: #888;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            color: #e53935;
            background: #ffebee;
        }

        .post-content {
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: #e3f2fd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #1a73e8;
        }

        .empty-text {
            font-size: 15px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0d47a1;
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            box-shadow: 0 4px 12px rgba(13, 71, 161, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 12px;
            }

            .post-box {
                margin-top: 12px;
                padding: 12px;
            }

            .btn {
                padding: 8px 18px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>简易微博</h1>
        </div>
    </header>

    <main class="container">
        <section class="post-box">
            <textarea id="contentInput" placeholder="分享新鲜事..." maxlength="500"></textarea>
            <div class="post-actions">
                <span class="char-count" id="charCount">0/500</span>
                <button class="btn btn-primary" id="publishBtn">发布</button>
            </div>
        </section>

        <section class="feed">
            <div class="feed-header">
                <span class="feed-title">最新动态</span>
                <span class="feed-count" id="feedCount">共 0 条</span>
            </div>
            <div class="post-list" id="postList"></div>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const STORAGE_KEY = 'simple_weibo_posts';
        const MAX_LENGTH = 500;

        const contentInput = document.getElementById('contentInput');
        const publishBtn = document.getElementById('publishBtn');
        const charCount = document.getElementById('charCount');
        const postList = document.getElementById('postList');
        const feedCount = document.getElementById('feedCount');
        const toast = document.getElementById('toast');

        function getPosts() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                console.error('读取本地数据失败', e);
                return [];
            }
        }

        function savePosts(posts) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
            } catch (e) {
                console.error('保存本地数据失败', e);
                showToast('存储失败，请检查浏览器空间');
            }
        }

        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return '刚刚';
            if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderPosts() {
            const posts = getPosts();
            feedCount.textContent = `共 ${posts.length} 条`;

            if (posts.length === 0) {
                postList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p class="empty-text">还没有微博，快来发布第一条吧！</p>
                    </div>
                `;
                return;
            }

            postList.innerHTML = posts.map(post => `
                <article class="post-item" data-id="${post.id}">
                    <div class="post-header">
                        <div class="post-author">
                            <div class="avatar">我</div>
                            <div class="author-info">
                                <span class="author-name">我</span>
                                <span class="post-time">${formatTime(post.createTime)}</span>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deletePost(${post.id})">删除</button>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                </article>
            `).join('');
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function publishPost() {
            const content = contentInput.value.trim();
            
            if (!content) {
                showToast('请输入微博内容');
                contentInput.focus();
                return;
            }

            if (content.length > MAX_LENGTH) {
                showToast('内容超出长度限制');
                return;
            }

            const posts = getPosts();
            const newPost = {
                id: Date.now(),
                content: content,
                createTime: new Date().toISOString()
            };

            posts.unshift(newPost);
            savePosts(posts);

            contentInput.value = '';
            charCount.textContent = `0/${MAX_LENGTH}`;
            charCount.classList.remove('warning');
            renderPosts();
            showToast('发布成功');
        }

        function deletePost(id) {
            if (!confirm('确定要删除这条微博吗？')) return;

            const posts = getPosts().filter(post => post.id !== id);
            savePosts(posts);
            renderPosts();
            showToast('删除成功');
        }

        contentInput.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = `${length}/${MAX_LENGTH}`;
            
            if (length >= MAX_LENGTH) {
                charCount.classList.add('warning');
            } else {
                charCount.classList.remove('warning');
            }
        });

        contentInput.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                publishPost();
            }
        });

        publishBtn.addEventListener('click', publishPost);

        renderPosts();
    </script>
</body>
</html>
